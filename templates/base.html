<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}HydroHelper{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --usgs-green:      #00843D;
      --usgs-green-dark: #006b31;
      --header-h: 56px;
    }

    /* Override Bootstrap primary colour with USGS green */
    .btn-primary          { background-color: var(--usgs-green); border-color: var(--usgs-green); }
    .btn-primary:hover,
    .btn-primary:focus    { background-color: var(--usgs-green-dark); border-color: var(--usgs-green-dark); }
    .btn-outline-primary  { color: var(--usgs-green); border-color: var(--usgs-green); }
    .btn-outline-primary:hover { background-color: var(--usgs-green); border-color: var(--usgs-green); }
    .text-primary         { color: var(--usgs-green) !important; }
    .bg-primary           { background-color: var(--usgs-green) !important; }
    a                     { color: var(--usgs-green); }
    a:hover               { color: var(--usgs-green-dark); }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body class="bg-light">

<nav class="navbar sticky-top" style="background-color: var(--usgs-green);">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-white text-decoration-none" href="/">HydroHelper</a>
    {% block nav_extra %}{% endblock %}
    <div class="ms-auto">
      {% if user.is_authenticated %}
        <a href="{% url 'account' %}" class="btn btn-outline-light btn-sm">{{ user.username }}</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Log In</a>
      {% endif %}
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
