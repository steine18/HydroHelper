{% extends "base.html" %}

{% block title %}Verify Your Email — HydroHelper{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 56px);">
  <div class="card shadow-sm" style="width: 360px;">
    <div class="card-body p-4 text-center">
      <h5 class="card-title fw-bold mb-1">Check Your Email</h5>
      <p class="text-muted small mb-4">
        A verification link has been sent to your email address.
        Click the link to activate your account.
      </p>
      <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 btn-sm">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
