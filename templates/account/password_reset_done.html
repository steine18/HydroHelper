{% extends "base.html" %}

{% block title %}Check Your Email — HydroHelper{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 56px);">
  <div class="card shadow-sm" style="width: 360px;">
    <div class="card-body p-4 text-center">
      <h5 class="card-title fw-bold mb-1">Check Your Email</h5>
      <p class="text-muted small mb-4">
        If an account exists for that address, a password reset link has been sent.
        Check your inbox (and spam folder).
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary w-100">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
