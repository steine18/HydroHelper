{% extends "base.html" %}

{% block title %}Reset Password — HydroHelper{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 56px);">
  <div class="card shadow-sm" style="width: 360px;">
    <div class="card-body p-4">
      <h5 class="card-title fw-bold mb-1">Reset Password</h5>
      <p class="text-muted small mb-4">Enter your email address and we'll send you a reset link.</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_email" class="form-label fw-semibold">Email Address</label>
          <input type="email" name="email" id="id_email" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
      </form>
      <hr class="my-3">
      <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 btn-sm">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
